version: "3.8"

services:
  # --- FastAPI App ---
  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://returnshield:returnshield@postgres:5432/returnshield
      - DATABASE_URL_SYNC=postgresql://returnshield:returnshield@postgres:5432/returnshield
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Hot reload in development
      - ./ml_models:/app/ml_models
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --reload

  # --- Celery Worker ---
  worker:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://returnshield:returnshield@postgres:5432/returnshield
      - DATABASE_URL_SYNC=postgresql://returnshield:returnshield@postgres:5432/returnshield
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info --concurrency=2

  # --- Celery Beat Scheduler ---
  beat:
    build: .
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: returnshield
      POSTGRES_PASSWORD: returnshield
      POSTGRES_DB: returnshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returnshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
