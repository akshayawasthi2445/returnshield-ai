<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReturnShield AI</title>

    <!-- Shopify App Bridge CDN -->
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>

    <!-- Polaris CDN Styles (matches Shopify admin look & feel) -->
    <link rel="stylesheet" href="https://unpkg.com/@shopify/polaris@latest/build/esm/styles.css" />

    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Base styles that match Shopify admin */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'San Francisco', 'Segoe UI',
                Roboto, 'Helvetica Neue', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #1a1a1a;
            background: #f1f1f1;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Polaris-like card */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        /* Polaris-like button */
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.15s ease;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-secondary {
            background: #f1f1f1;
            color: #1a1a1a;
            border: 1px solid #ccc;
        }

        .btn-secondary:hover {
            background: #e5e5e5;
        }

        /* Metrics grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.07);
            padding: 20px;
            text-align: center;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.2;
        }

        .metric-label {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .metric-trend {
            font-size: 12px;
            margin-top: 8px;
        }

        .metric-trend.positive {
            color: #008060;
        }

        .metric-trend.negative {
            color: #d72c0d;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            border-bottom: 1px solid #e1e3e5;
        }

        .data-table tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 14px;
        }

        .data-table tbody tr:hover {
            background: #f9fafb;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-pending {
            background: #ffd79d;
            color: #8a6116;
        }

        .badge-approved {
            background: #aee9d1;
            color: #0d6644;
        }

        .badge-rejected {
            background: #fed3d1;
            color: #8c1c13;
        }

        .badge-exchanged {
            background: #b7ecff;
            color: #003366;
        }

        .badge-high-risk {
            background: #fed3d1;
            color: #8c1c13;
        }

        .badge-medium-risk {
            background: #ffd79d;
            color: #8a6116;
        }

        .badge-low-risk {
            background: #aee9d1;
            color: #0d6644;
        }

        /* Navigation tabs */
        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .page-header p {
            color: #666;
            margin-top: 4px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state svg {
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .app-container {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <!-- App Bridge Navigation -->
    <s-app-nav>
        <a href="/dashboard" rel="home">Dashboard</a>
        <a href="/returns">Returns</a>
        <a href="/analytics">Analytics</a>
        <a href="/fit-engine">Fit Engine</a>
        <a href="/settings">Settings</a>
    </s-app-nav>

    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Initialize App Bridge
        const shopifyConfig = {
            apiKey: '{{ shopify_api_key }}',
        };

        // Dev Mock
        if (typeof shopify === 'undefined') {
            window.shopify = {
                idToken: async () => 'dev-token',
                toast: {
                    show: (msg) => alert(`[Toast] ${msg}`)
                }
            };
            console.warn("🛡️ Shopify App Bridge not detected. Using dev mock.");
        }

        // Helper: API call with session token
        async function apiCall(endpoint, options = {}) {
            const token = await shopify.idToken();
            const response = await fetch(`/api/v1${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'X-Dev-Bypass': 'true', // Signal to backend to bypass verification
                    'Content-Type': 'application/json',
                    ...options.headers,
                },
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'API error');
            }
            return response.json();
        }

        // Helper: Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
            }).format(amount);
        }

        // Helper: Format risk score as badge
        function riskBadge(score) {
            if (score > 0.7) return `<span class="badge badge-high-risk">${(score * 100).toFixed(0)}% risk</span>`;
            if (score > 0.4) return `<span class="badge badge-medium-risk">${(score * 100).toFixed(0)}% risk</span>`;
            return `<span class="badge badge-low-risk">${(score * 100).toFixed(0)}% risk</span>`;
        }

        // Helper: Status badge
        function statusBadge(status) {
            const cls = `badge-${status}`;
            return `<span class="badge ${cls}">${status}</span>`;
        }
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
